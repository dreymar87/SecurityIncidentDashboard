services:
  postgres:
    image: postgres:16-alpine
    container_name: sid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-security_dashboard}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sid_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-security_dashboard}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
      NVD_API_KEY: ${NVD_API_KEY:-}
      HIBP_API_KEY: ${HIBP_API_KEY:-}
      GREYNOISE_API_KEY: ${GREYNOISE_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ENABLE_AUTH: ${ENABLE_AUTH:-true}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /tmp/sid-imports:/tmp/sid-imports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sid_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sid_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - backend
    profiles: [monitoring]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: sid_grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Viewer'
    depends_on:
      - prometheus
    profiles: [monitoring]

volumes:
  postgres_data:
